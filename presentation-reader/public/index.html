<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>პრეზენტაციის წამკითხველი</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body>
  <main class="container">
    <h1>პრეზენტაციის წამკითხველი</h1>
    <p class="subtitle">ატვირთეთ პრეზენტაცია და წასაკითხი ტექსტი</p>

    <section class="upload-card" id="uploadCard">
      <div class="field">
        <label for="pptxInput">პრეზენტაცია (.pptx)</label>
        <input type="file" id="pptxInput" accept=".pptx" />
      </div>

      <div class="field">
        <label for="docxInput">წასაკითხი ტექსტი (.docx)</label>
        <input type="file" id="docxInput" accept=".docx" />
        <p class="field-hint">დოკუმენტში თითო აბზაცი = თითო სლაიდის წასაკითხი ტექსტი, თანმიმდევრობით.</p>
      </div>

      <button id="uploadBtn">ატვირთვა</button>

      <div id="loading" class="loading hidden">მიმდინარეობს დამუშავება… სლაიდების კონვერტაციას შესაძლოა რამდენიმე წამი დასჭირდეს.</div>
      <div id="errorBox" class="error hidden"></div>
    </section>

    <!-- Matching review screen -->
    <section id="reviewSection" class="hidden">
      <h2>შესაბამისობის გადამოწმება</h2>
      <div id="matchBanner"></div>
      <div id="matchList"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
