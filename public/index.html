<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>პრეზენტაციის წამკითხველი</title>
  <link rel="stylesheet" href="style.css" />
  <script src="/vendor/pdf.min.js"></script>
</head>
<body>
  <main class="container">
    <header id="appHeader">
      <h1>პრეზენტაციის წამკითხველი</h1>
      <p class="subtitle">ატვირთეთ პრეზენტაცია და წასაკითხი ტექსტი</p>
    </header>

    <section class="upload-card" id="uploadCard">
      <div class="field">
        <label for="pptxInput">პრეზენტაცია (.pptx)</label>
        <input type="file" id="pptxInput" accept=".pptx" />
      </div>

      <div class="field">
        <label for="docxInput">წასაკითხი ტექსტი (.docx)</label>
        <input type="file" id="docxInput" accept=".docx" />
        <p class="field-hint">დოკუმენტში თითო აბზაცი = თითო სლაიდის წასაკითხი ტექსტი, თანმიმდევრობით.</p>
      </div>

      <button id="uploadBtn">ატვირთვა</button>

      <div id="loading" class="loading hidden">მიმდინარეობს დამუშავება… სლაიდების კონვერტაციას შესაძლოა რამდენიმე წამი დასჭირდეს.</div>
      <div id="errorBox" class="error hidden"></div>
    </section>

    <!-- Matching review screen -->
    <section id="reviewSection" class="hidden">
      <h2>შესაბამისობის გადამოწმება</h2>
      <div id="matchBanner"></div>

      <div id="audioControls" class="hidden">
        <button id="generateBtn">ხმის გენერაცია</button>
        <div id="audioProgress" class="hidden">
          <div class="progress-track"><div id="progressFill" class="progress-fill"></div></div>
          <div id="progressText" class="progress-text"></div>
        </div>
        <button id="startBtn" class="hidden">პრეზენტაციის დაწყება</button>
        <div id="audioError" class="error hidden"></div>
      </div>

      <div id="matchList"></div>
    </section>

    <!-- Player -->
    <section id="playerSection" class="hidden">
      <div class="player-frame">
        <canvas id="slideCanvas"></canvas>
      </div>
      <div class="player-controls">
        <button id="prevBtn" title="წინა სლაიდი">◀</button>
        <button id="playPauseBtn">პაუზა</button>
        <button id="nextBtn" title="შემდეგი სლაიდი">▶</button>
        <span id="slideCounter"></span>
        <label class="rate-label">სიჩქარე
          <select id="rateSelect">
            <option value="0.85">0.85×</option>
            <option value="1" selected>1×</option>
            <option value="1.15">1.15×</option>
            <option value="1.3">1.3×</option>
          </select>
        </label>
        <button id="backBtn" class="secondary">← უკან</button>
      </div>
      <div id="endedBanner" class="banner ok hidden">პრეზენტაცია დასრულდა. <button id="restartBtn" class="linklike">თავიდან დაწყება</button></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
